services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: domus
      POSTGRES_USER: domus
      POSTGRES_PASSWORD: domus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domus -d domus"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://domus:domus@postgres:5432/domus?schema=public
      DIRECT_URL: postgresql://domus:domus@postgres:5432/domus?schema=public
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
